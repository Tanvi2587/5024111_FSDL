<!DOCTYPE html>
<html>
<head>
<title>Variables and Operators Example</title>
<style>
body{
    background: linear-gradient(to right, #4facfe, #00f2fe);
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 80px;
}
.container{
    background-color: white;
    width: 350px;
    margin: auto;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
}

h2{
    color: #333;
}

.result{
    margin-top: 20px;
    font-size: 18px;
    color: #444;
}
</style>
</head>

<body>

<div class="container">
<h2>Variables & Operators Example</h2>

<div class="result" id="output"></div>
</div>

<script>
let num1 = 10;
let num2 = 5;

let sum = num1 + num2;
let multiply = num1 * num2;

document.getElementById("output").innerHTML =
"Number 1: " + num1 + "<br>" +
"Number 2: " + num2 + "<br>" +
"Sum: " + sum + "<br>" +
"Multiplication: " + multiply;
</script>

</body>
</html>
